# TODO: Update package pinnings in conda_build_config for every release
schema_version: 1
context:
  version: "2.0.0"
  build_number: 1
recipe:
  name: nvidia-dali-python-split
  version: ${{ version }}
source:
  - url: https://github.com/NVIDIA/DALI/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 6423d941cefc5c052ad0ea9dda8e58f84019a2e4de288a3d6b35e67d09479e79
    patches:
      - patches/0001-BLD-Use-CUDA-target-include-directory-to-support-cro.patch
      - patches/0004-BLD-Dynamically-link-nvjpeg2k.patch
      - patches/0002-DOC-Patch-dlopen-failure-message-and-dlopen-search-p.patch
      - patches/0005-BLD-Remove-CUDA-arch-validation.patch
      - patches/0003-BLD-Use-shared-libtar-instead-of-static.patch
      - patches/0007-BLD-Use-pre-build-cvcuda-instead-of-submodule.patch
      # TODO: Drop 0008 in the release after v2.1.0 — upstream fixed this in
      # NVIDIA/DALI commit 581c8710 (PR #6296) on main, landing in v2.2.0.
      - patches/0008-BLD-Handle-NVML-ERROR-NOT-SUPPORTED-gracefully-on-pa.patch
      # TODO: Drop 0009 in the release after v2.1.0 — upstream fixed this in
      # NVIDIA/DALI commit a9b672ff (PR #6290) on main, landing in v2.2.0.
      - patches/0009-TST-Fix-glob_to_regex-for-Python-3.14.patch
      - patches/0010-TST-Use-installed-wds2idx-console-script-when-availa.patch
      # TODO: No upstream fix exists yet. Open a PR against NVIDIA/DALI to make
      # is_of_supported() tolerant of pynvml >= 11.0.0 returning str, then drop
      # this patch once the fix lands.
      - patches/0011-TST-Handle-pynvml-str-return-from-nvmlSystemGetDrive.patch
  - url: https://github.com/cocodataset/cocoapi/archive/8c9bcc3cf640524c4c20a9c40e89cb6a2f2fa0e9.tar.gz
    sha256: 4dd3450bab2287d1c1b271cf4a1420db05294194f0ad9af4e3af592d6f2b4410
    target_directory: third_party/cocoapi
  - url: https://github.com/JanuszL/ffts/archive/6ef8d818f46f679c95110ab199ae915fb04bfef5.tar.gz
    sha256: 1d157157828ce1c85d0a43a6de312ce168b3c5dc1223c6ad3f02e074c3806c15
    target_directory: third_party/ffts
build:
  skip:
    - not linux
  variant:
    use_keys:
      - python

outputs:
  - package:
      name: nvidia-dali-python
      version: ${{ version }}
    build:
      number: ${{ build_number }}
      script: build.sh
      skip:
        - cuda_compiler_version == "None"
        - not linux
        # - match(python, "!=3.12.*")
    requirements:
      ignore_run_exports:
        by_name:
          - cuda-version
        from_package:
          - libcufft-dev
          - libcufile-dev
          - libcurand-dev
          - libnpp-dev
          - libnvjpeg-dev
          - libnvimgcodec-dev  ${{ libnvimgcodec }}
          - if: (arm_variant_type | default("")) != "tegra"
            then:
              - libnvcomp-dev  ${{ libnvcomp }}
          # Added libprotobuf to pick up channel pinnings, but we use the static package
          - libprotobuf
      build:
        - ${{ compiler('cuda') }}
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - if: linux and aarch64 and not match(cuda_compiler_version, "==None")
          then:
            - arm-variant * ${{ arm_variant_type | default("None") }}
        - cmake 3.*
        - file
        - ninja
        - pkgconf
        - if: build_platform != target_platform
          then:
            - cross-python_${{ target_platform }}
            - python
            - python-clang
            - libprotobuf
            - libprotobuf-static
      host:
      # NOTE: static libraries culibos and nvjpeg required for correct feature detection
        - if: linux and match(cuda_compiler_version, "13.*")
          then:
            - cuda-culibos-static
        - cuda-cudart-static
        - cuda-nvml-dev
        - libcufft-dev
        - libcufile-dev
        - libcurand-dev
        - libnpp-dev
        - libnvjpeg-dev
        - libnvjpeg-static
        - libcvcuda-dev
        - cuda-version ${{ cuda_compiler_version }}.*
        - aws-sdk-cpp
        - cfitsio
        - cutlass
        - dlpack
        - ffmpeg
        - ffmpeg * lgpl*
        - libabseil
        - libboost-headers  ${{ libboost_headers }}
        - libjpeg-turbo
        - if: (arm_variant_type | default("")) != "tegra"
          then:
            - libnvcomp-dev  ${{ libnvcomp }}
        - libnvimgcodec-dev  ${{ libnvimgcodec }}
        - libnvjpeg2k-dev  ${{ libnvjpeg2k }}
        - libopencv
        - libprotobuf
        - libprotobuf-static
        - libsndfile
        - libtar
        - libtiff
        - lmdb
        - nvtx-c
        - pip
        - pybind11
        - python
        - python-clang
        - rapidjson
        - setuptools
        - zlib
        # Runtime deps from below, for stub generator
        - nvtx
        - makefun
        - astunparse ${{ astunparse }}
        - gast ${{ gast }}
        - six ${{ six }}
        - dm-tree ${{ dm_tree }}
        - packaging ${{ packaging }}
        # Stubs autoformat themselves
        - black  ${{ black }}
      run:
        - python
        - nvtx
        - makefun
        - astunparse ${{ astunparse }}
        - gast ${{ gast }}
        - six ${{ six }}
        - dm-tree ${{ dm_tree }}
        - packaging ${{ packaging }}
        - ${{ pin_compatible('cuda-version', lower_bound='x', upper_bound='x') }}
      run_constraints:
        # These packages are dlopen'd and are already constrained by cuda-version
        # FIXME: Consider a meta-package like "nvidia-dali-all" for convenience
        # - if: match(cuda_compiler_version, "12.*")
        #   then:
        #     - libcufft
        #     - libcufile
        #     - libnpp
        #     - libnvjpeg
        - libboost-headers  ${{ libboost_headers }}
        - if: (arm_variant_type | default("")) != "tegra"
          then:
            - libnvcomp  ${{ libnvcomp }}
        - libnvimgcodec ${{ libnvimgcodec }}
    tests:
      - requirements:
          run:
            - pip
            # Test that optional dependencies are co-installable
            - libcufft
            - libcufile
            - libnpp
            - libnvjpeg
            - libboost-headers
            - if: (arm_variant_type | default("")) != "tegra"
              then:
                - libnvcomp
            - libnvimgcodec
        script:
          - pip check
          - python -c "import nvidia.dali"
          - tfrecord2idx --help
          - wds2idx --help

  - package:
      name: nvidia-dali-python-test
      version: ${{ version }}
    build:
      number: ${{ build_number }}
      script: build-test.sh
      noarch: generic
      skip:
        - true
        - cuda_compiler_version == "None"
        - not linux
    requirements:
      run:
        - ${{ pin_subpackage('nvidia-dali-python', upper_bound='x.x.x') }}
        - python
        # DALI dlopens these CUDA runtime libraries at test time
        - libcufft
        - libcufile
        - libnpp
        - libnvjpeg
        - libnvjpeg2k0 ${{ libnvjpeg2k }}
        - if: (arm_variant_type | default("")) != "tegra"
          then:
            - libnvcomp ${{ libnvcomp }}
        - libnvimgcodec ${{ libnvimgcodec }}
        # Test dependencies
        - nose
        - nose2
        - nose-timer
        - numpy
        - py-opencv
        - pillow
        - scipy
        - librosa
        - pynvml
        - numba
        - lz4
        - psutil
        - dill
        - cloudpickle
        - astropy
        - av
        - mypy
        - git
    tests:
      - script:
          - run-dali-tests --list-suites

about:
  summary: A GPU-accelerated library for data loading and pre-processing to accelerate deep learning applications.
  description: |
    A GPU-accelerated library containing highly optimized building blocks and
    an execution engine for data processing to accelerate deep learning training
    and inference applications.
  license: Apache-2.0 AND BSD-3-Clause AND BSD-2-Clause
  license_file:
    - LICENSE
    - COPYRIGHT
    - Acknowledgements.txt  # Contains licenses for linked libraries
    - third_party/README.rst
  homepage: https://github.com/NVIDIA/dali
extra:
  recipe-maintainers:
    - conda-forge/cuda
    - isuruf
    - timkpaine
